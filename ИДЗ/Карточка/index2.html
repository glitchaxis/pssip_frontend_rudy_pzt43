
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Платье Versace</title>
    <link rel="stylesheet" href="style2.css">
<base target="_blank">
</head>
<body>
    <div class="container">
        <div class="product">
            <!-- Image -->
            <div class="product-image">
                <img src="dress.jpg" alt="Платье Versace" class="image">
            </div>

            <!-- Info -->
            <div class="product-info">
                <!-- Title and rating -->
                <div class="header">
                    <h1 class="title">ПЛАТЬЕ VERSACE</h1>
                    <div class="rating">
                        <span class="star">★</span>
                        <span class="star">★</span>
                        <span class="star">★</span>
                        <span class="star">★</span>
                        <span class="star empty">★</span>
                    </div>
                </div>

                <!-- Description -->
                <p class="description">
                    Современное платье Версаче разработано для элегантных и уверенных в себе дам. Вечерние наряды от этого бренда выбирают стильные и утонченные девушки.
                </p>

                <!-- Size: numeric -->
                <div class="size-row">
                    <span class="size-label">Размер</span>
                    <div class="size-num">42</div>
                </div>

                <!-- Size: letters -->
                <div class="size-row">
                    <span class="size-label">Размер</span>
                    <div class="size-letters">
                        <button class="size-btn active" type="button">S</button>
                        <button class="size-btn" type="button">M</button>
                        <button class="size-btn" type="button">L</button>
                        <button class="size-btn" type="button">XL</button>
                    </div>
                </div>

                <!-- Quantity -->
                <div class="quantity-row">
                    <span class="quantity-label">Кол-во</span>
                    <div class="quantity-control">
                        <button class="qty-btn" type="button">−</button>
                        <span class="qty-value">1</span>
                        <button class="qty-btn" type="button">+</button>
                    </div>
                </div>

                <!-- Price -->
                <div class="price">42 900 руб.</div>

                <!-- Actions -->
                <div class="actions">
                    <button class="btn-cart" type="button">В КОРЗИНУ</button>
                    <button class="btn-icon" type="button" aria-label="В избранное">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                        </svg>
                    </button>
                    <button class="btn-icon" type="button" aria-label="Сравнить">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M12 6v6l4 2"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
